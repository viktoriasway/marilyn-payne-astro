<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude MCP Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.5rem; }
  .status-row { display: flex; align-items: center; gap: 0.75rem; font-size: 1.8rem; font-weight: 700; }
  .dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
  .dot.alive { background: #22c55e; box-shadow: 0 0 14px #22c55e; }
  .dot.dead  { background: #ef4444; box-shadow: 0 0 14px #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .timer-row { font-size: 1rem; color: #888; }
  .timer-row span { color: #ccc; font-weight: 600; }
  .countdown { font-size: 3rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
  .countdown.warning { color: #f59e0b; }
  .countdown.danger  { color: #ef4444; }
  .countdown.ok      { color: #22c55e; }
  .btns { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
  button { padding: 0.55rem 1.3rem; border-radius: 8px; border: 1px solid #333; background: #222; color: #eee; font-size: 0.95rem; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #333; }
  .log { font-size: 0.75rem; color: #555; max-height: 100px; overflow-y: auto; text-align: left; width: 420px; border: 1px solid #222; border-radius: 6px; padding: 0.5rem 0.75rem; }
  .log div { border-bottom: 1px solid #1a1a1a; padding: 2px 0; }
  .instructions { font-size: 0.8rem; color: #555; max-width: 420px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<div class="status-row">
  <div class="dot alive" id="dot"></div>
  <span id="statusText">Claude MCP — ACTIVE</span>
</div>

<div class="countdown ok" id="countdown">4:00</div>

<div class="timer-row">Last Claude activity: <span id="lastPing">just now</span></div>

<div class="btns">
  <button onclick="resetTimer()">✅ Reset Timer</button>
  <button onclick="testAlarm()">🔔 Test Alarm</button>
  <button id="muteBtn" onclick="toggleMute()">🔊 Mute</button>
</div>

<div class="log" id="log"></div>

<div class="instructions">
  Timer resets automatically when Claude executes code in this tab.<br>
  Alarm fires when Claude has been idle for 4 minutes — time to reconnect.
</div>

<script>
  const TIMEOUT_MS = 4 * 60 * 1000;
  let lastActivity = Date.now();
  let muted = false;
  let alarmActive = false;
  let alarmTimer = null;
  let audioCtx = null;

  // ── Audio ──
  function ctx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function beep(freq, dur, vol, delay) {
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(vol, c.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    o.start(c.currentTime + delay);
    o.stop(c.currentTime + delay + dur + 0.01);
  }
  function playAlarmSound() {
    if (muted) return;
    // Urgent triple beep pattern
    beep(960, 0.18, 0.5, 0.0);
    beep(960, 0.18, 0.5, 0.25);
    beep(720, 0.4,  0.5, 0.5);
  }
  function startAlarm() {
    if (alarmActive) return;
    alarmActive = true;
    playAlarmSound();
    alarmTimer = setInterval(playAlarmSound, 3500);
    log('🚨 ALARM — Claude MCP idle timeout');
  }
  function stopAlarm() {
    alarmActive = false;
    clearInterval(alarmTimer);
  }
  function testAlarm() { ctx(); playAlarmSound(); log('🔔 Test alarm'); }
  function toggleMute() {
    muted = !muted;
    document.getElementById('muteBtn').textContent = muted ? '🔇 Unmute' : '🔊 Mute';
    if (muted) stopAlarm();
    log(muted ? '🔇 Muted' : '🔊 Unmuted');
  }

  // ── Timer reset — called by Claude on every tool execution ──
  function resetTimer() {
    lastActivity = Date.now();
    stopAlarm();
    document.getElementById('dot').className = 'dot alive';
    document.getElementById('statusText').textContent = 'Claude MCP — ACTIVE';
    log('✅ Claude activity detected — timer reset');
  }

  // Expose globally so Claude can call it
  window.claudePing = resetTimer;

  // ── Countdown display ──
  setInterval(() => {
    const elapsed = Date.now() - lastActivity;
    const remaining = Math.max(0, TIMEOUT_MS - elapsed);
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    const cd = document.getElementById('countdown');
    cd.textContent = mins + ':' + String(secs).padStart(2, '0');
    cd.className = 'countdown ' + (remaining > 90000 ? 'ok' : remaining > 30000 ? 'warning' : 'danger');
    document.getElementById('lastPing').textContent = Math.floor(elapsed / 1000) + 's ago';

    if (remaining === 0 && !alarmActive) {
      document.getElementById('dot').className = 'dot dead';
      document.getElementById('statusText').textContent = 'Claude MCP — TIMED OUT';
      startAlarm();
    }
  }, 500);

  // ── Log ──
  function log(msg) {
    const el = document.getElementById('log');
    const t = new Date().toLocaleTimeString();
    el.innerHTML = '<div>' + t + ' ' + msg + '</div>' + el.innerHTML;
  }

  // Unlock audio on first interaction
  document.addEventListener('click', () => { try { ctx(); } catch(e){} }, { once: true });

  log('🟢 Monitor started — alarm after 4 min Claude idle');
</script>
</body>
</html>
